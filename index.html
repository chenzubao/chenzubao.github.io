<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谌氏族谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            padding: 30px;
            background: #f7f8fa;
        }
        .title {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: #333;
        }
        .search-box {
            max-width: 500px;
            margin: 0 auto 40px;
            display: flex;
            gap: 8px;
        }
        #searchInput {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        #searchInput:focus {
            border-color: #1890ff;
        }
        .search-btn {
            padding: 10px 16px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .search-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 竖版垂直族谱样式 */
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            margin-top: 20px;
        }
        .node {
            padding: 12px 20px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            min-width: 160px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            margin: 10px 0;
        }
        .node.highlight {
            background: #fff2cc;
            border-color: #ff9800;
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.3);
        }

        /* 竖线连接上下代 */
        .node::after {
            content: "";
            width: 1px;
            height: 20px;
            background: #999;
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .node.last::after {
            display: none;
        }

        #loading {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin: 50px 0;
        }
    </style>
</head>
<body>
    <div class="title">谌氏族谱</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入名字搜索..." autocomplete="off">
        <button class="search-btn" onclick="prevMatch()" disabled>上一个</button>
        <button class="search-btn" onclick="nextMatch()" disabled>下一个</button>
    </div>
    <div id="loading">正在读取族谱数据...</div>
    <div id="tree"></div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        let matchNodes = [];
        let currentIndex = 0;

        // 读取Excel
        async function loadExcel() {
            try {
                const res = await fetch("谌氏族谱.xlsx");
                const blob = await res.blob();
                const data = await blob.arrayBuffer();
                const workbook = XLSX.read(data);
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                buildVerticalTree(json);
                document.getElementById("loading").style.display = "none";
            } catch (e) {
                document.getElementById("loading").innerText = "读取Excel失败，请检查文件名";
                console.error(e);
            }
        }

        // 🔥 核心：按Excel每一行，从上到下竖版展示（不改Excel）
        function buildVerticalTree(rows) {
            const treeContainer = document.getElementById("tree");
            treeContainer.innerHTML = "";

            if (!rows || rows.length === 0) {
                treeContainer.innerHTML = "暂无数据";
                return;
            }

            // 遍历每一行，生成垂直族谱
            rows.forEach((row, rowIndex) => {
                if (!row || row.every(item => !item)) return;

                const rowWrapper = document.createElement("div");
                rowWrapper.style.marginBottom = "40px";
                treeContainer.appendChild(rowWrapper);

                const tree = document.createElement("div");
                tree.className = "tree";
                rowWrapper.appendChild(tree);

                // 每一行的每一列 = 一代，从上往下排列
                row.forEach((name, colIndex) => {
                    if (!name) return;

                    const node = document.createElement("div");
                    const isLast = colIndex === row.length - 1;
                    node.className = `node ${isLast ? "last" : ""}`;
                    node.dataset.name = name;
                    node.innerHTML = `${name}<br><small>第${colIndex + 1}代</small>`;
                    tree.appendChild(node);
                });
            });

            searchName();
        }

        // 搜索功能
        const input = document.getElementById('searchInput');
        input.addEventListener('input', searchName);
        input.addEventListener('keyup', e => e.key === 'Enter' && nextMatch());

        function searchName() {
            const key = input.value.trim();
            document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight'));
            matchNodes = [];
            currentIndex = 0;
            document.querySelectorAll('.search-btn').forEach(b => b.disabled = true);
            if (!key) return;

            document.querySelectorAll('.node').forEach(node => {
                if (node.dataset.name.includes(key)) matchNodes.push(node);
            });

            if (matchNodes.length > 0) {
                document.querySelectorAll('.search-btn').forEach(b => b.disabled = false);
                goToMatch(0);
            }
        }

        function goToMatch(index) {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight'));
            matchNodes[index].classList.add('highlight');
            matchNodes[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function prevMatch() {
            currentIndex = (currentIndex - 1 + matchNodes.length) % matchNodes.length;
            goToMatch(currentIndex);
        }

        function nextMatch() {
            currentIndex = (currentIndex + 1) % matchNodes.length;
            goToMatch(currentIndex);
        }

        window.onload = loadExcel;
    </script>
</body>
</html>
